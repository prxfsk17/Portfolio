{% extends "base_api.html" %}

{% block title %}Error - F1 Circuits{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row min-vh-50 align-items-center">
        <div class="col-lg-6 mx-auto text-center">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 5rem;"></i>
            </div>
            
            <h1 class="display-4 fw-bold text-danger mb-4">Oops! Error</h1>
            
            <div class="card bg-dark border-danger mb-4">
                <div class="card-body p-4">
                    <p class="lead mb-0">
                        <i class="bi bi-info-circle-fill me-2 text-info"></i>
                        {{ message }}
                    </p>
                </div>
            </div>
            
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('api_project.home') }}" class="btn btn-danger btn-lg px-4">
                    <i class="bi bi-house-door-fill me-2"></i>
                    Return Home
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-light btn-lg px-4">
                    <i class="bi bi-arrow-left me-2"></i>
                    Go Back
                </a>
            </div>
            
            <div class="mt-5 text-secondary-emphasis">
                <small>
                    <i class="bi bi-clock-history me-1"></i>
                    If this problem persists, please check system status
                </small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
